<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | PromptlyPi</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #7366ff;
            --primary-light: #e2dfff;
            --secondary: #f73164;
            --bg-body: #f5f6fa;
            --card-bg: #ffffff;
            --text-dark: #2b2b2b;
            --text-muted: #898989;
            --border-color: #f1f3f9;
            --radius-lg: 15px;
            --shadow-soft: 0 4px 20px rgba(8, 21, 66, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Rubik', sans-serif;
            margin: 0;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .login-card h2 { color: var(--text-dark); margin: 0 0 5px 0; font-size: 1.8rem; }
        .login-card p { color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem; }

        /* Role Selector Grid */
        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .role-btn {
            background: var(--bg-body);
            border: 2px solid transparent;
            padding: 15px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            font-weight: 500;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .role-btn span { font-size: 1.5rem; }
        
        .role-btn:hover { background: var(--primary-light); color: var(--primary); }
        .role-btn.active { 
            background: var(--primary-light); 
            border-color: var(--primary); 
            color: var(--primary); 
            box-shadow: 0 4px 10px rgba(115, 102, 255, 0.2);
        }

        /* Form Inputs */
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 500; font-size: 0.9rem; }
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            outline: none; 
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }

        .submit-btn { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            font-family: inherit;
        }
        .submit-btn:hover { background: #6054e6; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(115, 102, 255, 0.3); }

        #error-message { 
            color: var(--secondary); 
            font-size: 0.9rem; 
            margin-top: 15px; 
            display: none; 
            background: #ffe5e5;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div style="width: 50px; height: 50px; background: var(--primary-light); color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; margin: 0 auto 15px auto;">
            <img height="50px" src="../assest/crown.webp">
        </div>
        <h2>Staff Portal</h2>
        <p>Select your department to authenticate.</p>

        <div class="role-grid" id="role-selector">
            <button class="role-btn active" data-role="moderator">
                <span>🛡️</span> Moderator
            </button>
            <button class="role-btn" data-role="commercial">
                <span>💰</span> Commercial
            </button>
            <button class="role-btn" data-role="management">
                <span>📢</span> Management
            </button>
            <button class="role-btn" data-role="admin">
                <span>👑</span> Admin Hub
            </button>
        </div>

        <div class="input-group">
            <label>Work Email</label>
            <input type="email" id="staff-email" placeholder="name@promptlypi.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="staff-password" placeholder="••••••••">
        </div>

        <button id="staffLoginBtn" class="submit-btn">Access Portal</button>
        <p id="error-message"></p>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
