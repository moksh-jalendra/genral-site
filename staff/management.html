<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Management | PromptlyPi Staff</title>
    <style>
        :root { --primary: #7366ff; --bg-body: #f5f6fa; --card-bg: #ffffff; --text-dark: #2b2b2b; --text-muted: #898989; --border-color: #f1f3f9; --radius-lg: 15px; }
        body { font-family: sans-serif; background: var(--bg-body); margin: 0; padding: 20px; color: var(--text-dark); }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius-lg); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; box-sizing: border-box;}
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        .btn-delete { background: #f73164; width: auto; padding: 6px 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📢 Management Department</h2>
        <button id="logoutBtn" style="background: transparent; border: none; color: black; cursor: pointer; width: auto;">Log Out</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <h3>Add Dynamic Reward Card</h3>
            <input type="text" id="reward-title" placeholder="e.g. 50 Rs Amazon Card">
            <input type="number" id="reward-cost" placeholder="Cost (Coins)">
            <input type="url" id="reward-image" placeholder="Image URL">
            <button id="addRewardBtn">Publish to Store</button>
        </div>

        <div class="card">
            <h3>Send Global Alert</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted);">Sends a notification to all users.</p>
            <input type="text" id="notif-title" placeholder="Event / Maintenance Title">
            <textarea id="notif-body" rows="3" placeholder="Message details..."></textarea>
            <button id="sendNotifBtn" style="background: #f59e0b;">Broadcast Global Alert</button>
        </div>
    </div>

    <!-- NEW: Active Rewards Store Management -->
    <div class="card">
        <h3>Active Reward Store Items</h3>
        <table>
            <thead><tr><th>Reward Title</th><th>Cost</th><th>Action</th></tr></thead>
            <tbody id="active-rewards-body"><tr><td colspan="3">Loading...</td></tr></tbody>
        </table>
    </div>

    <script type="module" src="management.js"></script>
</body>
</html>
