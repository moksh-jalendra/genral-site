<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Hub | PromptlyPi Staff</title>
    <style>
        :root { --primary: #7366ff; --bg-body: #f5f6fa; --card-bg: #ffffff; --text-dark: #2b2b2b; --text-muted: #898989; --border-color: #f1f3f9; --radius-lg: 15px; }
        body { font-family: sans-serif; background: var(--bg-body); margin: 0; padding: 20px; color: var(--text-dark); }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius-lg); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        .btn-danger { background: #f73164; }
    </style>
</head>
<body>
    <div class="header">
        <h2>👑 Admin Hub</h2>
        <button id="logoutBtn" style="background: transparent; color: #f73164; border: 1px solid #f73164;">Log Out</button>
    </div>
    <div style="margin-bottom: 20px;">
        <img id="profile-image" src="https://i.sstatic.net/iKbP7.jpg" alt="Admin Icon" style="width: 100px; height: 100px; border-radius: 10px;">
    </div>

    <!-- NEW: Database Maintenance Sweeper -->
    <div class="card" style="border-left: 5px solid #f73164;">
        <h3>🧹 Database Integrity</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Clean up old view logs to maintain optimal database speed and minimize storage costs.</p>
        <button id="sweepButton" class="btn-danger" onclick="triggerDatabaseSweep()">Sweep Logs Older than 24h</button>
    </div>

    <div class="card">
        <h3>Assign Staff Roles</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Grant users access to the staff portal.</p>
        <input type="text" id="target-uid" placeholder="Enter User's UID">
        <select id="role-select">
            <option value="moderator">Moderator</option>
            <option value="commercial">Commercial Dept</option>
            <option value="management">Management Dept</option>
            <option value="admin">Admin</option>
        </select>
        <button id="assignRoleBtn">Grant Access</button>
    </div>

    <div class="card">
        <h3>Moderator Performance</h3>
        <table>
            <thead><tr><th>Moderator UID</th><th>Network Size (Invited)</th></tr></thead>
            <tbody id="mod-table-body"><tr><td colspan="2">Loading...</td></tr></tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
